name: Diagnóstico API FP Markets

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Testar conectividade com a API da FP Markets
        env:
          TOKEN: ${{ secrets.CTRADER_ACCESS_TOKEN }}
          ACCOUNT_ID: ${{ secrets.CTRADER_ACCOUNT_ID }}
        run: |
          echo "🔑 Token: ${TOKEN:0:10}..."
          echo "🆔 Account ID: ${ACCOUNT_ID}"
          echo ""
          echo "🌐 Ping api.ct.fpmarkets.com"
          ping -c 2 api.ct.fpmarkets.com || echo "Falha no ping"
          echo ""
          echo "📡 Tentando listar contas..."
          curl -v -H "Authorization: Bearer ${TOKEN}" \
            "https://api.ct.fpmarkets.com/v2/accounts" 2>&1 | head -50
          echo ""
          echo "📡 Tentando obter trades..."
          FROM=$(date -d '6 months ago' -u +"%Y-%m-%dT%H:%M:%SZ")
          TO=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          curl -v -H "Authorization: Bearer ${TOKEN}" \
            "https://api.ct.fpmarkets.com/v2/accounts/${ACCOUNT_ID}/trades?from=${FROM}&to=${TO}&limit=5" 2>&1 | head -50
