name: Diagnóstico completo de endpoints

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Testar endpoints da Open API
        env:
          TOKEN: ${{ secrets.CTRADER_ACCESS_TOKEN }}
        run: |
          echo "🔑 Token: ${TOKEN:0:10}..."
          FROM=$(date -d '6 months ago' -u +"%Y-%m-%dT%H:%M:%SZ")
          TO=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          PARAMS="from=${FROM}&to=${TO}&limit=3"

          # Lista de domínios a testar
          DOMAINS=(
            "https://openapi.ctrader.com"
            "https://api.ct.fpmarkets.com"
            "https://fpmarkets.ctraderapi.com"
            "https://demo.ctraderapi.com"
          )

          # Endpoints possíveis para trades (com accountId)
          ENDPOINTS=(
            "/v2/accounts/45897831/trades"
            "/v2/accounts/1077772/trades"
            "/v1/accounts/45897831/trades"
            "/v1/accounts/1077772/trades"
            "/v2/trades/45897831"
            "/v2/trades?accountId=45897831"
            "/v2/accounts/45897831/history"
            "/v1/accounts/45897831/history"
            "/v2/accounts/45897831/orders"
            "/v2/accounts/45897831/positions"
          )

          echo "🔍 Testando combinações..."
          for domain in "${DOMAINS[@]}"; do
            for endpoint in "${ENDPOINTS[@]}"; do
              URL="${domain}${endpoint}?${PARAMS}"
              echo "🌐 ${URL}"
              RESPONSE=$(curl -s -w "\n%{http_code}" -H "Authorization: Bearer ${TOKEN}" "${URL}" 2>&1)
              HTTP_CODE=$(echo "$RESPONSE" | tail -1)
              BODY=$(echo "$RESPONSE" | sed '$d')
              if [ "$HTTP_CODE" = "200" ]; then
                echo "   ✅ SUCESSO (HTTP 200)"
                echo "$BODY" | head -c 500
                echo ""
                echo "🎯 ENDPOINT CORRETO: $URL"
                exit 0
              else
                echo "   ❌ HTTP $HTTP_CODE"
              fi
            done
          done
          echo "❌ Nenhum endpoint funcionou."
          exit 1
