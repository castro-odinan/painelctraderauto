name: Atualizar trades.json

on:
  schedule:
    - cron: '0 */6 * * *'   # a cada 6 horas (UTC)
  workflow_dispatch:         # permite execução manual

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # necessário para dar push no repo
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Instalar dependências
        run: npm install node-fetch@2

      - name: Buscar trades da Open API
        env:
          CTRADER_CLIENT_ID: ${{ secrets.CTRADER_CLIENT_ID }}
          CTRADER_CLIENT_SECRET: ${{ secrets.CTRADER_CLIENT_SECRET }}
          CTRADER_ACCOUNT_ID: ${{ secrets.CTRADER_ACCOUNT_ID }}
        run: node update-trades.js

      - name: Commit e push do trades.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add trades.json
          git diff --staged --quiet || git commit -m "Atualiza trades.json [automático]"
          git push
