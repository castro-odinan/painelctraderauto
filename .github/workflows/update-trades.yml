name: Diagnóstico Final

on:
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - name: Descobrir domínio e buscar trades
        env:
          TOKEN: ${{ secrets.CTRADER_ACCESS_TOKEN }}
        run: |
          echo "🔑 Token: ${TOKEN:0:10}..."
          
          DOMAINS=(
            "https://openapi.ctrader.com"
            "https://api.ct.fpmarkets.com"
            "https://fpmarkets.ctraderapi.com"
            "https://demo.ctraderapi.com"
            "https://p.c-trader.com"
            "https://api.p.c-trader.com"
            "https://fpmarketssc.ctraderapi.com"
          )

          WORKING_DOMAIN=""
          for domain in "${DOMAINS[@]}"; do
            url="${domain}/v2/accounts"
            echo "🌐 Tentando listar contas: $url"
            response=$(curl -s -w "\n%{http_code}" -H "Authorization: Bearer ${TOKEN}" "$url" 2>/dev/null)
            http_code=$(echo "$response" | tail -1)
            body=$(echo "$response" | sed '$d')
            if [ "$http_code" = "200" ]; then
              echo "   ✅ SUCESSO (HTTP 200)"
              echo "   Resposta: $body" | head -c 300
              WORKING_DOMAIN="$domain"
              break
            else
              echo "   ❌ HTTP $http_code"
            fi
          done

          if [ -z "$WORKING_DOMAIN" ]; then
            echo "❌ Nenhum domínio retornou 200 para /v2/accounts. Verifique as permissões do token."
            exit 1
          fi

          echo ""
          echo "🎯 Domínio funcional: $WORKING_DOMAIN"
          echo "🔎 Buscando trades..."

          FROM=$(date -d '6 months ago' -u +"%Y-%m-%dT%H:%M:%SZ")
          TO=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          TRADE_URL="${WORKING_DOMAIN}/v2/accounts/45897831/trades?from=${FROM}&to=${TO}&limit=3"
          echo "🌐 $TRADE_URL"
          trade_response=$(curl -s -w "\n%{http_code}" -H "Authorization: Bearer ${TOKEN}" "$TRADE_URL")
          trade_code=$(echo "$trade_response" | tail -1)
          trade_body=$(echo "$trade_response" | sed '$d')
          if [ "$trade_code" = "200" ]; then
            echo "   ✅ Trades obtidos!"
            echo "$trade_body" | head -c 500
            echo ""
            echo "🎉 ENDPOINT CORRETO: $TRADE_URL"
          else
            echo "   ❌ HTTP $trade_code"
            echo "   Corpo: $trade_body"
            echo ""
            echo "🔁 Tentando endpoint alternativo: /v2/accounts/45897831/history"
            HIST_URL="${WORKING_DOMAIN}/v2/accounts/45897831/history?from=${FROM}&to=${TO}&limit=3"
            echo "🌐 $HIST_URL"
            hist_response=$(curl -s -w "\n%{http_code}" -H "Authorization: Bearer ${TOKEN}" "$HIST_URL")
            hist_code=$(echo "$hist_response" | tail -1)
            hist_body=$(echo "$hist_response" | sed '$d')
            if [ "$hist_code" = "200" ]; then
              echo "   ✅ History funcionou!"
              echo "$hist_body" | head -c 500
              echo "🎉 ENDPOINT ALTERNATIVO: $HIST_URL"
            else
              echo "   ❌ Também falhou (HTTP $hist_code)"
            fi
          fi
